name: Supabase keepalive

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python - <<'PY'
          import os
          import sys
          import urllib.error
          import urllib.request

          url = os.environ.get("SUPABASE_URL", "").strip().strip('"').strip("'").rstrip("/")
          key = os.environ.get("SUPABASE_ANON_KEY", "").strip().strip('"').strip("'")

          if not url:
              print("SUPABASE_URL saknas i GitHub Secrets.")
              sys.exit(1)
          if not key:
              print("SUPABASE_ANON_KEY saknas i GitHub Secrets.")
              sys.exit(1)
          if not url.startswith("https://"):
              print("SUPABASE_URL ska börja med https://")
              sys.exit(1)

          request = urllib.request.Request(
              f"{url}/rest/v1/rpc/keepalive",
              data=b"{}",
              method="POST",
              headers={
                  "apikey": key,
                  "Authorization": f"Bearer {key}",
                  "Content-Type": "application/json",
              },
          )

          try:
              with urllib.request.urlopen(request, timeout=20) as response:
                  print(f"Supabase svarade OK: HTTP {response.status}")
                  print(response.read(200).decode("utf-8", "replace"))
          except urllib.error.HTTPError as exc:
              print(f"Supabase svarade med fel: HTTP {exc.code}")
              print(exc.read(500).decode("utf-8", "replace"))
              sys.exit(1)
          except Exception as exc:
              print(f"Kunde inte nå Supabase: {exc}")
              sys.exit(1)
          PY
