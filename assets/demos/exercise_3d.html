<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: Inter, system-ui, sans-serif;
  }

  #exercise-demo {
    position: relative;
    width: 100%;
    height: 450px;
    overflow: hidden;
  }

  #exercise-demo canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  #exercise-status {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: #667078;
    font-size: 14px;
    font-weight: 600;
    pointer-events: none;
  }

  #exercise-toggle {
    position: absolute;
    right: 12px;
    bottom: 12px;
    display: grid;
    width: 44px;
    height: 44px;
    place-items: center;
    border: 1px solid rgba(18, 21, 23, 0.16);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.92);
    color: #151719;
    box-shadow: 0 8px 24px rgba(18, 21, 23, 0.12);
    font: inherit;
    font-size: 17px;
    cursor: pointer;
  }

  #exercise-toggle:disabled {
    cursor: default;
    opacity: 0;
  }

  #exercise-toggle:focus-visible {
    outline: 3px solid rgba(14, 124, 102, 0.34);
    outline-offset: 2px;
  }

  @media (max-width: 520px) {
    #exercise-demo {
      height: 410px;
    }
  }
</style>

<div id="exercise-demo">
  <div id="exercise-status" role="status">Laddar utförande...</div>
  <button id="exercise-toggle" type="button" aria-label="Pausa animationen" disabled>Ⅱ</button>
</div>

<script type="module">
  (async () => {
    const config = __DEMO_CONFIG__;
    const stage = document.getElementById("exercise-demo");
    const status = document.getElementById("exercise-status");
    const toggle = document.getElementById("exercise-toggle");

    try {
      const THREE = await import(
        "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      );

      const palette = {
        outline: new THREE.Color("#151719"),
        skin: new THREE.Color("#9ca5a3"),
        shirt: new THREE.Color("#19745f"),
        shorts: new THREE.Color("#30353a"),
        machine: new THREE.Color("#4f5960"),
        machineInset: new THREE.Color("#7b858a"),
        accent: new THREE.Color("#b68a3d"),
        floor: new THREE.Color("#e5e8ea"),
        light: new THREE.Color("#fffdf8"),
      };

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
      camera.position.set(4.9, 2.55, 7.6);
      camera.lookAt(0, 0.2, 0);

      const renderer = new THREE.WebGLRenderer({
        alpha: true,
        antialias: true,
        powerPreference: "high-performance",
        preserveDrawingBuffer: true,
      });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.domElement.setAttribute("role", "img");
      renderer.domElement.setAttribute(
        "aria-label",
        `En tredimensionell figur visar ${config.name}`
      );
      stage.prepend(renderer.domElement);

      const gradientMap = new THREE.DataTexture(
        new Uint8Array([55, 105, 165, 225]),
        4,
        1,
        THREE.RedFormat
      );
      gradientMap.minFilter = THREE.NearestFilter;
      gradientMap.magFilter = THREE.NearestFilter;
      gradientMap.needsUpdate = true;

      scene.add(new THREE.HemisphereLight(palette.light, palette.floor, 0.8));

      const keyLight = new THREE.DirectionalLight(palette.light, 1.55);
      keyLight.position.set(4.5, 7, 5.5);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.set(1024, 1024);
      keyLight.shadow.camera.near = 0.1;
      keyLight.shadow.camera.far = 20;
      keyLight.shadow.camera.left = -6;
      keyLight.shadow.camera.right = 6;
      keyLight.shadow.camera.top = 6;
      keyLight.shadow.camera.bottom = -5;
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(palette.shirt, 0.58);
      rimLight.position.set(-5, 3.5, -4);
      scene.add(rimLight);

      const outlineMaterial = new THREE.MeshBasicMaterial({
        color: palette.outline,
        side: THREE.BackSide,
      });

      const outlinedMesh = (geometry, color, outlineScale = 1.035) => {
        const mesh = new THREE.Mesh(
          geometry,
          new THREE.MeshToonMaterial({ color, gradientMap })
        );
        const outline = new THREE.Mesh(geometry, outlineMaterial);
        outline.scale.setScalar(outlineScale);
        outline.renderOrder = -1;
        mesh.add(outline);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return mesh;
      };

      const sphere = (radius, color) =>
        outlinedMesh(new THREE.SphereGeometry(radius, 20, 14), color, 1.045);

      const box = (width, height, depth, color = palette.machine) =>
        outlinedMesh(
          new THREE.BoxGeometry(width, height, depth),
          color,
          1.025
        );

      const cylinder = (
        radius,
        length,
        color = palette.machine,
        segments = 16
      ) =>
        outlinedMesh(
          new THREE.CylinderGeometry(radius, radius, length, segments),
          color,
          1.04
        );

      const dynamicSegment = (radius, color) => {
        const geometry = new THREE.CapsuleGeometry(
          radius,
          Math.max(0.02, 1 - radius * 2),
          6,
          12
        );
        const mesh = outlinedMesh(geometry, color);
        return {
          mesh,
          update(start, end) {
            const direction = end.clone().sub(start);
            const length = Math.max(0.001, direction.length());
            mesh.position.copy(start).add(end).multiplyScalar(0.5);
            mesh.quaternion.setFromUnitVectors(
              new THREE.Vector3(0, 1, 0),
              direction.normalize()
            );
            mesh.scale.set(1, length, 1);
          },
        };
      };

      const dynamicLine = (color = palette.outline) => {
        const positions = new Float32Array(6);
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute(
          "position",
          new THREE.BufferAttribute(positions, 3)
        );
        const line = new THREE.Line(
          geometry,
          new THREE.LineBasicMaterial({ color })
        );
        return {
          line,
          update(start, end) {
            positions[0] = start.x;
            positions[1] = start.y;
            positions[2] = start.z;
            positions[3] = end.x;
            positions[4] = end.y;
            positions[5] = end.z;
            geometry.attributes.position.needsUpdate = true;
          },
        };
      };

      const root = new THREE.Group();
      root.rotation.y = -0.12;
      scene.add(root);

      const equipment = new THREE.Group();
      const figure = new THREE.Group();
      root.add(equipment, figure);

      const body = {
        torso: dynamicSegment(0.4, palette.shirt),
        neck: dynamicSegment(0.15, palette.skin),
        leftUpperArm: dynamicSegment(0.16, palette.shirt),
        rightUpperArm: dynamicSegment(0.16, palette.shirt),
        leftForearm: dynamicSegment(0.14, palette.skin),
        rightForearm: dynamicSegment(0.14, palette.skin),
        leftThigh: dynamicSegment(0.2, palette.shorts),
        rightThigh: dynamicSegment(0.2, palette.shorts),
        leftShin: dynamicSegment(0.17, palette.skin),
        rightShin: dynamicSegment(0.17, palette.skin),
      };

      for (const segment of Object.values(body)) {
        figure.add(segment.mesh);
      }

      const pelvis = sphere(0.38, palette.shorts);
      pelvis.scale.set(1.05, 0.72, 0.82);
      const head = sphere(0.38, palette.skin);
      head.scale.set(0.9, 1.08, 0.92);
      const leftElbow = sphere(0.15, palette.skin);
      const rightElbow = sphere(0.15, palette.skin);
      const leftHand = sphere(0.14, palette.skin);
      const rightHand = sphere(0.14, palette.skin);
      const leftKnee = sphere(0.18, palette.shorts);
      const rightKnee = sphere(0.18, palette.shorts);
      figure.add(
        pelvis,
        head,
        leftElbow,
        rightElbow,
        leftHand,
        rightHand,
        leftKnee,
        rightKnee
      );

      const makeShoe = () => {
        const shoe = outlinedMesh(
          new THREE.CapsuleGeometry(0.14, 0.38, 6, 12),
          palette.shorts,
          1.045
        );
        shoe.rotation.x = Math.PI / 2;
        shoe.scale.y = 0.84;
        figure.add(shoe);
        return shoe;
      };
      const leftShoe = makeShoe();
      const rightShoe = makeShoe();

      const makeDumbbell = () => {
        const group = new THREE.Group();
        const handle = cylinder(0.04, 0.42, palette.accent);
        handle.rotation.x = Math.PI / 2;
        const plateA = cylinder(0.12, 0.09, palette.machine);
        const plateB = cylinder(0.12, 0.09, palette.machine);
        plateA.rotation.x = Math.PI / 2;
        plateB.rotation.x = Math.PI / 2;
        plateA.position.z = -0.2;
        plateB.position.z = 0.2;
        group.add(handle, plateA, plateB);
        equipment.add(group);
        return group;
      };

      const leftDumbbell = makeDumbbell();
      const rightDumbbell = makeDumbbell();
      leftDumbbell.visible = false;
      rightDumbbell.visible = false;

      const barbell = new THREE.Group();
      const barShaft = cylinder(0.045, 2.7, palette.accent);
      barShaft.rotation.z = Math.PI / 2;
      const barPlateLeft = cylinder(0.18, 0.13, palette.machine);
      const barPlateRight = cylinder(0.18, 0.13, palette.machine);
      barPlateLeft.rotation.z = Math.PI / 2;
      barPlateRight.rotation.z = Math.PI / 2;
      barPlateLeft.position.x = -1.2;
      barPlateRight.position.x = 1.2;
      barbell.add(barShaft, barPlateLeft, barPlateRight);
      barbell.visible = false;
      equipment.add(barbell);

      const cableLeft = dynamicLine();
      const cableRight = dynamicLine();
      cableLeft.line.visible = false;
      cableRight.line.visible = false;
      equipment.add(cableLeft.line, cableRight.line);
      const cableBar = cylinder(0.05, 2.35, palette.accent);
      cableBar.rotation.z = Math.PI / 2;
      cableBar.visible = false;
      equipment.add(cableBar);

      let selectedPlate = null;
      let roller = null;
      let abWheel = null;
      let landmineBar = null;

      const addBench = (incline = false) => {
        const pad = box(0.95, 0.18, 2.55, palette.shorts);
        pad.position.set(0, -0.72, 0.25);
        if (incline) {
          pad.rotation.x = -0.46;
          pad.position.set(0, -0.32, 0.15);
        }
        const post = cylinder(0.1, 1.1);
        post.position.set(0, -1.28, 0.4);
        equipment.add(pad, post);
      };

      const addCableFrame = (wide = false) => {
        const span = wide ? 2.35 : 1.55;
        for (const x of [-span, span]) {
          const upright = box(0.18, 4.55, 0.28);
          upright.position.set(x, 0.35, -0.72);
          equipment.add(upright);
        }
        const top = box(span * 2 + 0.25, 0.18, 0.28);
        top.position.set(0, 2.62, -0.72);
        equipment.add(top);
        const housing = box(0.72, 1.55, 0.45, palette.machineInset);
        housing.position.set(-span, -0.9, -0.48);
        equipment.add(housing);
        selectedPlate = box(0.58, 0.12, 0.38, palette.accent);
        selectedPlate.position.set(-span, -0.42, -0.18);
        equipment.add(selectedPlate);
      };

      const addSeat = (back = false) => {
        const seat = box(0.9, 0.17, 1.0, palette.shorts);
        seat.position.set(0, -0.65, 0.35);
        const post = cylinder(0.11, 1.1);
        post.position.set(0, -1.25, 0.3);
        equipment.add(seat, post);
        if (back) {
          const backPad = box(0.95, 1.55, 0.17, palette.shorts);
          backPad.position.set(0, 0.05, -0.12);
          backPad.rotation.x = -0.1;
          equipment.add(backPad);
        }
      };

      const addPullupBar = () => {
        const topBar = cylinder(0.07, 2.5, palette.accent);
        topBar.rotation.z = Math.PI / 2;
        topBar.position.set(0, 2.62, 0);
        const leftPost = box(0.16, 4.5, 0.22);
        const rightPost = box(0.16, 4.5, 0.22);
        leftPost.position.set(-1.45, 0.4, -0.45);
        rightPost.position.set(1.45, 0.4, -0.45);
        equipment.add(topBar, leftPost, rightPost);
      };

      const addLegMachine = (mode) => {
        addSeat(true);
        const arm = cylinder(0.09, 1.2, palette.accent);
        arm.rotation.z = Math.PI / 2;
        arm.position.set(0, -1.05, 1.25);
        roller = cylinder(0.2, 1.05, palette.shorts);
        roller.rotation.z = Math.PI / 2;
        roller.position.set(0, mode === "leg_curl" ? -1.28 : -0.85, 1.35);
        equipment.add(arm, roller);
      };

      const addStep = () => {
        const step = box(1.5, 0.18, 0.75, palette.machineInset);
        step.position.set(0, -1.82, 0.15);
        equipment.add(step);
      };

      const addAbWheel = () => {
        abWheel = cylinder(0.22, 0.18, palette.accent, 20);
        abWheel.rotation.z = Math.PI / 2;
        abWheel.position.set(0, -1.58, 0.5);
        const handle = cylinder(0.04, 0.72, palette.machine);
        handle.rotation.z = Math.PI / 2;
        abWheel.add(handle);
        equipment.add(abWheel);
      };

      const addLandmine = () => {
        landmineBar = cylinder(0.055, 3.0, palette.accent);
        landmineBar.position.set(0, -0.55, 0.55);
        landmineBar.rotation.x = 0.82;
        const pivot = sphere(0.18, palette.machine);
        pivot.position.set(0, -1.75, -0.65);
        equipment.add(landmineBar, pivot);
      };

      const cableModes = new Set([
        "cable_fly",
        "cable_press",
        "straight_arm_pulldown",
        "lat_pulldown",
        "face_pull",
        "triceps_pushdown",
        "overhead_extension",
        "woodchop",
        "cable_crunch",
        "seated_row",
      ]);
      const benchModes = new Set([
        "incline_press",
        "bench_press",
        "chest_supported_row",
        "spider_curl",
        "preacher_curl",
        "bench_leg_raise",
        "abs_bench",
        "hip_thrust",
      ]);
      const dumbbellModes = new Set([
        "incline_press",
        "bench_press",
        "one_arm_row",
        "shoulder_press",
        "lateral_raise",
        "front_raise",
        "rear_delt_fly",
        "biceps_curl",
        "hammer_curl",
        "spider_curl",
        "preacher_curl",
        "goblet_squat",
        "sumo_squat",
        "rdl",
        "reverse_lunge",
        "split_squat",
        "carry",
        "wrist_curl",
      ]);
      const barbellModes = new Set([
        "squat",
        "front_squat",
        "deadlift",
        "hip_thrust",
        "landmine_rotation",
      ]);

      if (cableModes.has(config.mode)) {
        addCableFrame(["cable_fly", "cable_press"].includes(config.mode));
      }
      if (benchModes.has(config.mode)) {
        addBench(["incline_press", "chest_supported_row", "spider_curl"].includes(config.mode));
      }
      if (["lat_pulldown", "seated_row"].includes(config.mode)) {
        addSeat(config.mode === "seated_row");
      }
      if (["pullup", "chinup", "hanging_leg_raise"].includes(config.mode)) {
        addPullupBar();
      }
      if (["leg_press", "leg_curl", "hip_abduction"].includes(config.mode)) {
        addLegMachine(config.mode);
      }
      if (config.mode === "calf_raise") addStep();
      if (config.mode === "ab_roller") addAbWheel();
      if (config.mode === "landmine_rotation") addLandmine();

      leftDumbbell.visible = dumbbellModes.has(config.mode);
      rightDumbbell.visible = dumbbellModes.has(config.mode);
      if (["one_arm_row", "goblet_squat", "sumo_squat"].includes(config.mode)) {
        leftDumbbell.visible = false;
      }
      barbell.visible = barbellModes.has(config.mode);

      const v = (x, y, z = 0) => new THREE.Vector3(x, y, z);
      const mix = (a, b, amount) => a.clone().lerp(b, amount);
      const smoothStep = (value) => value * value * (3 - 2 * value);

      const standingPose = () => ({
        pelvis: v(0, -0.18, 0),
        chest: v(0, 0.92, 0),
        neck: v(0, 1.55, 0),
        head: v(0, 1.98, 0),
        shoulderLeft: v(-0.5, 1.26, 0),
        shoulderRight: v(0.5, 1.26, 0),
        elbowLeft: v(-0.58, 0.55, 0),
        elbowRight: v(0.58, 0.55, 0),
        handLeft: v(-0.58, -0.08, 0),
        handRight: v(0.58, -0.08, 0),
        hipLeft: v(-0.25, -0.32, 0),
        hipRight: v(0.25, -0.32, 0),
        kneeLeft: v(-0.25, -1.05, 0.05),
        kneeRight: v(0.25, -1.05, 0.05),
        ankleLeft: v(-0.25, -1.72, 0.04),
        ankleRight: v(0.25, -1.72, 0.04),
      });

      const seatedPose = () => {
        const pose = standingPose();
        pose.pelvis = v(0, -0.25, 0.22);
        pose.chest = v(0, 0.82, 0.05);
        pose.neck = v(0, 1.43, 0.02);
        pose.head = v(0, 1.85, 0.02);
        pose.shoulderLeft = v(-0.5, 1.18, 0.03);
        pose.shoulderRight = v(0.5, 1.18, 0.03);
        pose.hipLeft = v(-0.25, -0.38, 0.28);
        pose.hipRight = v(0.25, -0.38, 0.28);
        pose.kneeLeft = v(-0.34, -0.72, 1.15);
        pose.kneeRight = v(0.34, -0.72, 1.15);
        pose.ankleLeft = v(-0.34, -1.48, 1.12);
        pose.ankleRight = v(0.34, -1.48, 1.12);
        return pose;
      };

      const lyingPose = (incline = false) => {
        const pelvisY = -0.55;
        const chestY = incline ? 0.16 : -0.34;
        const pose = standingPose();
        pose.pelvis = v(0, pelvisY, 0.72);
        pose.chest = v(0, chestY, -0.12);
        pose.neck = v(0, chestY + 0.12, -0.76);
        pose.head = v(0, chestY + 0.18, -1.15);
        pose.shoulderLeft = v(-0.48, chestY + 0.08, -0.42);
        pose.shoulderRight = v(0.48, chestY + 0.08, -0.42);
        pose.hipLeft = v(-0.25, pelvisY, 0.65);
        pose.hipRight = v(0.25, pelvisY, 0.65);
        pose.kneeLeft = v(-0.3, -0.18, 1.42);
        pose.kneeRight = v(0.3, -0.18, 1.42);
        pose.ankleLeft = v(-0.3, -1.12, 1.78);
        pose.ankleRight = v(0.3, -1.12, 1.78);
        return pose;
      };

      const motionPose = (progress, elapsed) => {
        let pose = standingPose();
        const mode = config.mode;

        if (["incline_press", "bench_press"].includes(mode)) {
          pose = lyingPose(mode === "incline_press");
          const baseY = pose.shoulderLeft.y;
          pose.elbowLeft = mix(v(-1.0, baseY, -0.2), v(-0.58, baseY + 0.63, -0.3), progress);
          pose.elbowRight = mix(v(1.0, baseY, -0.2), v(0.58, baseY + 0.63, -0.3), progress);
          pose.handLeft = mix(v(-0.62, baseY + 0.06, -0.2), v(-0.52, baseY + 0.92, -0.32), progress);
          pose.handRight = mix(v(0.62, baseY + 0.06, -0.2), v(0.52, baseY + 0.92, -0.32), progress);
        } else if (mode === "cable_fly") {
          pose.elbowLeft = mix(v(-1.12, 1.18, -0.2), v(-0.34, 1.22, 0.62), progress);
          pose.elbowRight = mix(v(1.12, 1.18, -0.2), v(0.34, 1.22, 0.62), progress);
          pose.handLeft = mix(v(-1.56, 1.16, -0.15), v(-0.12, 1.24, 1.02), progress);
          pose.handRight = mix(v(1.56, 1.16, -0.15), v(0.12, 1.24, 1.02), progress);
        } else if (mode === "push_up") {
          pose = lyingPose(false);
          const lift = -0.95 + progress * 0.45;
          pose.pelvis.y = lift;
          pose.chest.y = lift + 0.03;
          pose.neck.y = lift + 0.05;
          pose.head.y = lift + 0.08;
          pose.hipLeft.y = lift - 0.04;
          pose.hipRight.y = lift - 0.04;
          pose.kneeLeft = v(-0.26, lift - 0.12, 1.48);
          pose.kneeRight = v(0.26, lift - 0.12, 1.48);
          pose.ankleLeft = v(-0.26, -1.62, 2.05);
          pose.ankleRight = v(0.26, -1.62, 2.05);
          pose.shoulderLeft = v(-0.48, lift + 0.03, -0.38);
          pose.shoulderRight = v(0.48, lift + 0.03, -0.38);
          pose.elbowLeft = v(-0.92, -1.42 + progress * 0.52, -0.18);
          pose.elbowRight = v(0.92, -1.42 + progress * 0.52, -0.18);
          pose.handLeft = v(-0.58, -1.62, -0.18);
          pose.handRight = v(0.58, -1.62, -0.18);
        } else if (["pullup", "chinup"].includes(mode)) {
          const rise = progress * 0.72;
          for (const key of ["pelvis", "chest", "neck", "head", "hipLeft", "hipRight", "kneeLeft", "kneeRight", "ankleLeft", "ankleRight"]) {
            pose[key].y += rise;
          }
          pose.shoulderLeft = v(-0.48, 1.42 + rise, 0);
          pose.shoulderRight = v(0.48, 1.42 + rise, 0);
          pose.handLeft = v(-0.72, 2.58, 0);
          pose.handRight = v(0.72, 2.58, 0);
          pose.elbowLeft = mix(v(-0.72, 1.95, 0), v(-0.88, 2.05, 0), progress);
          pose.elbowRight = mix(v(0.72, 1.95, 0), v(0.88, 2.05, 0), progress);
        } else if (mode === "hanging_leg_raise") {
          pose.handLeft = v(-0.72, 2.58, 0);
          pose.handRight = v(0.72, 2.58, 0);
          pose.elbowLeft = v(-0.65, 1.92, 0);
          pose.elbowRight = v(0.65, 1.92, 0);
          pose.kneeLeft = mix(v(-0.24, -1.02, 0), v(-0.24, 0.15, 0.72), progress);
          pose.kneeRight = mix(v(0.24, -1.02, 0), v(0.24, 0.15, 0.72), progress);
          pose.ankleLeft = mix(v(-0.24, -1.72, 0), v(-0.24, -0.02, 1.48), progress);
          pose.ankleRight = mix(v(0.24, -1.72, 0), v(0.24, -0.02, 1.48), progress);
        } else if (mode === "lat_pulldown") {
          pose = seatedPose();

          if (config.mode === "leg_curl") {
            roller.position.z = 1.35 - progress * 0.32;
          } else if (config.mode === "hip_abduction") {
            roller.scale.y = 1 + progress * 0.5;
          }
        }

        if (abWheel) {
          abWheel.position.z = 0.72 + progress * 1.3;
          abWheel.rotation.x = progress * 4;
        }

        if (landmineBar) {
          landmineBar.rotation.z = (progress - 0.5) * 0.95;
        }
      };

      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(3.8, 64),
        new THREE.MeshStandardMaterial({
          color: palette.floor,
          transparent: true,
          opacity: 0.9,
          roughness: 1,
        })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -1.9;
      ground.receiveShadow = true;
      scene.add(ground);

      let paused = false;
      let elapsedBeforePause = 0;
      let animationStart = performance.now();
      let dragging = false;
      let pointerX = 0;
      let targetRotation = root.rotation.y;
      let canvasVerified = false;

      const movementProgress = (elapsedSeconds) => {
        if (["hollow_hold", "carry"].includes(config.mode)) return 0.6;
        const cycle = (elapsedSeconds % 4.4) / 4.4;
        if (cycle < 0.14) return 0;
        if (cycle < 0.44) return smoothStep((cycle - 0.14) / 0.3);
        if (cycle < 0.62) return 1;
        return 1 - smoothStep((cycle - 0.62) / 0.38);
      };

      const setPaused = (nextPaused) => {
        if (nextPaused === paused) return;
        paused = nextPaused;
        if (paused) {
          elapsedBeforePause += (performance.now() - animationStart) / 1000;
        } else {
          animationStart = performance.now();
        }
        toggle.textContent = paused ? "▶" : "Ⅱ";
        toggle.setAttribute(
          "aria-label",
          paused ? "Spela animationen" : "Pausa animationen"
        );
        toggle.setAttribute("aria-pressed", String(paused));
      };

      toggle.addEventListener("click", () => setPaused(!paused));

      renderer.domElement.addEventListener("pointerdown", (event) => {
        dragging = true;
        pointerX = event.clientX;
        renderer.domElement.setPointerCapture(event.pointerId);
      });

      renderer.domElement.addEventListener("pointermove", (event) => {
        if (!dragging) return;
        targetRotation += (event.clientX - pointerX) * 0.008;
        pointerX = event.clientX;
      });

      const stopDragging = (event) => {
        dragging = false;
        if (renderer.domElement.hasPointerCapture(event.pointerId)) {
          renderer.domElement.releasePointerCapture(event.pointerId);
        }
      };

      renderer.domElement.addEventListener("pointerup", stopDragging);
      renderer.domElement.addEventListener("pointercancel", stopDragging);

      const resize = () => {
        const width = Math.max(1, stage.clientWidth);
        const height = Math.max(1, stage.clientHeight);
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      };

      const resizeObserver = new ResizeObserver(resize);
      resizeObserver.observe(stage);
      resize();

      const renderFrame = (now) => {
        const elapsed = paused
          ? elapsedBeforePause
          : elapsedBeforePause + (now - animationStart) / 1000;
        const progress = movementProgress(elapsed);
        const pose = motionPose(progress, elapsed);

        updateBody(pose);
        updateEquipment(pose, progress);
        root.rotation.y += (targetRotation - root.rotation.y) * 0.12;
        renderer.render(scene, camera);

        if (!canvasVerified) {
          const gl = renderer.getContext();
          const sample = new Uint8Array(4);
          const width = renderer.domElement.width;
          const height = renderer.domElement.height;
          let visibleSamples = 0;
          for (const point of [
            [0.5, 0.5],
            [0.28, 0.35],
            [0.72, 0.35],
            [0.3, 0.7],
            [0.68, 0.7],
          ]) {
            gl.readPixels(
              Math.floor(width * point[0]),
              Math.floor(height * point[1]),
              1,
              1,
              gl.RGBA,
              gl.UNSIGNED_BYTE,
              sample
            );
            if (sample[3] > 8) visibleSamples += 1;
          }
          if (visibleSamples > 0) {
            canvasVerified = true;
            status.hidden = true;
            toggle.disabled = false;
          }
        }

        requestAnimationFrame(renderFrame);
      };

      requestAnimationFrame(renderFrame);

      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        setPaused(true);
      }
    } catch (error) {
      status.textContent = "Kunde inte ladda 3D-visningen.";
      status.style.color = "#b42318";
    }
  })();
</script>
